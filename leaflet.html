<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Square Bar — Leaflet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,700;0,800;0,900;1,300&display=swap" rel="stylesheet" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --w: 397px;
      --h: 560px;
      --brown:  #793a29;
      --honey:  #e6b65c;
      --ink:    #1a0f08;
      --cream:  #F7F6F1;
    }

    body {
      background: #111;
      font-family: 'Montserrat', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px;
    }

    .page {
      width: var(--w);
      height: var(--h);
      background: var(--ink);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── TOP AREA (70%) ── */
    .top {
      flex: 0 0 70%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 28px 28px 24px;
      position: relative;
    }

    .logo {
      height: 72px;
      width: auto;
      display: block;
      align-self: flex-end;
    }

    .headline-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .eyebrow {
      display: none;
    }

    .headline {
      font-size: 60px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.9;
      color: var(--cream);
      text-transform: uppercase;
    }

    .headline em {
      font-style: italic;
      font-weight: 300;
      color: var(--honey);
    }

    .subline {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.38);
      margin-top: 10px;
    }

    .secondary {
      font-size: 7px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.18);
      margin-top: 4px;
    }

    /* honey accent line */
    .accent-line {
      width: 32px;
      height: 2px;
      background: var(--honey);
      margin-bottom: 2px;
    }

    /* ── BOTTOM AREA (30%) ── */
    .bottom {
      flex: 0 0 30%;
      background: var(--brown);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      gap: 20px;
    }

    .bottom__left {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cta-label {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }

    .cta {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--honey);
      text-transform: uppercase;
    }

    .url {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 2px;
    }

    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .qr {
      width: 110px;
      height: 110px;
      object-fit: cover;
      display: block;
      border-radius: 4px;
      background: var(--cream);
      padding: 5px;
    }

    .qr-label {
      font-size: 5.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
    }

    /* subtle decoration */
    .bg-square {
      position: absolute;
      bottom: -40px;
      left: -30px;
      width: 180px;
      height: 180px;
      border: 1px solid rgba(230, 182, 92, 0.06);
      transform: rotate(22deg);
      pointer-events: none;
    }

    .bg-square-2 {
      position: absolute;
      top: 80px;
      right: -50px;
      width: 140px;
      height: 140px;
      border: 1px solid rgba(230, 182, 92, 0.04);
      transform: rotate(15deg);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="page" id="leaflet">

    <div class="top">
      <img class="logo" src="tsb-logo-golden.png" alt="The Square Bar" />

      <div class="headline-block">
        <div class="accent-line"></div>
        <h1 class="headline">Just<br><em>real</em><br>food.</h1>
        <p class="subline">No additives. Ever.</p>
        <p class="secondary">Two bars. Same rules.</p>
      </div>

      <div class="bg-square"></div>
      <div class="bg-square-2"></div>
    </div>

    <div class="bottom">
      <div class="bottom__left">
        <span class="cta-label">Scan to discover</span>
        <span class="cta">Try one.</span>
        <span class="url">thesquarebar.ch</span>
      </div>
      <div class="qr-wrap">
        <img class="qr" src="QR_code_leaflet.jpeg" alt="QR" />
        <span class="qr-label">Scan to visit</span>
      </div>
    </div>

  </div>
</body>
</html>
